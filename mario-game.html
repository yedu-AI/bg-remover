<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Mario Bros. 1-1</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #5c94fc;
            --panel: #000;
            --text: #f8f8f8;
            --accent: #fcbc3c;
            --border: #f8f8f8;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.1), transparent 40%),
                linear-gradient(180deg, #7cadff 0%, #5c94fc 60%, #4b82f7 100%);
            color: var(--text);
            font-family: "Press Start 2P", monospace;
        }

        #game-shell {
            position: relative;
            width: min(96vw, 1024px);
            aspect-ratio: 16 / 15;
            border: 4px solid var(--border);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
            image-rendering: pixelated;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: var(--bg);
            image-rendering: pixelated;
        }

        #hud {
            position: absolute;
            inset: 0 auto auto 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 16px 20px;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            font-size: 12px;
            line-height: 1.45;
        }

        #overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.7);
        }

        #panel {
            width: min(82%, 720px);
            background: rgba(0, 0, 0, 0.9);
            border: 4px solid var(--border);
            padding: 28px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            color: var(--accent);
            margin-bottom: 18px;
        }

        p {
            font-size: 12px;
            line-height: 1.8;
        }

        .hidden {
            display: none !important;
        }

        button {
            margin-top: 22px;
            padding: 14px 26px;
            border: 4px solid var(--border);
            background: #b53120;
            color: var(--text);
            font: inherit;
            cursor: pointer;
        }

        @media (max-width: 720px) {
            #hud {
                font-size: 9px;
                padding: 10px 12px;
            }

            h1 {
                font-size: 18px;
            }

            p {
                font-size: 9px;
            }

            button {
                font-size: 10px;
                padding: 10px 16px;
            }
        }
    </style>
</head>

    <div id="game-shell">

        <div id="hud">

        <div id="overlay">

                <p>包含问号砖、普通砖、管道、栗宝宝、诺诺龟、旗杆、城堡、视差背景与道具体系。</p>
                <button id="start-btn">开始游戏</button>
            </div>
        </div>

        // SpriteRenderer 负责把 manifest 中的像素网格画到 canvas。
        // sprite 数据保留独立 manifest，后续如果切到图片贴图，调用方仍然不需要改。
        class SpriteRenderer {
            constructor(ctx, manifest) {
                this.ctx = ctx;
                this.manifest = manifest;
            }

            getSprite(path) {
                const sprite = path.split(".").reduce((node, key) => node && node[key], this.manifest);
                if (!sprite) return null;
                if (sprite.aliasOf) {
                    const target = this.getSprite(sprite.aliasOf);
                    return target ? { ...target, sheetX: sprite.sheetX, sheetY: sprite.sheetY } : null;
                }
                return sprite;
            }

            drawSprite(path, x, y, targetWidth, targetHeight, options = {}) {
                const sprite = this.getSprite(path);
                if (!sprite) return;

                const palette = options.palette || {};
                const scaleX = targetWidth / sprite.width;
                const scaleY = targetHeight / sprite.height;

                this.ctx.save();
                this.ctx.globalAlpha = options.alpha ?? 1;

                if (options.flipX) {
                    this.ctx.translate(x + targetWidth, y);
                    this.ctx.scale(-1, 1);
                    x = 0;
                    y = 0;
                }

                if (sprite.pixels) {
                    sprite.pixels.forEach(pixel => {
                        this.ctx.fillStyle = palette[pixel.color] || pixel.color;
                        this.ctx.fillRect(
                            x + pixel.x * scaleX,
                            y + pixel.y * scaleY,
                            Math.max(1, scaleX),
                            Math.max(1, scaleY)
                        );
                    });
                } else if (sprite.layers) {
                    sprite.layers.forEach(layer => {
                        this.ctx.fillStyle = palette[layer.color] || layer.color;
                        this.ctx.fillRect(
                            x + layer.x * scaleX,
                            y + layer.y * scaleY,
                            Math.max(1, layer.w * scaleX),
                            Math.max(1, layer.h * scaleY)
                        );
                    });
                }

                this.ctx.restore();
            }
        }

        // AnimationController 只做一件事：根据当前状态推进帧序列。
        // 状态切换由外部逻辑决定，这样可以完全复用现有物理/碰撞系统。
        class AnimationController {
            constructor(definitions, initialState) {
                this.definitions = definitions;
                this.state = initialState;
                this.frameIndex = 0;
                this.frameTimer = 0;
            }

            setState(nextState, force = false) {
                if (!this.definitions[nextState]) return;
                if (!force && this.state === nextState) return;
                this.state = nextState;
                this.frameIndex = 0;
                this.frameTimer = 0;
            }

            update(step = 1) {
                const current = this.definitions[this.state];
                if (!current || current.frames.length <= 1) return;
                this.frameTimer += step;
                if (this.frameTimer >= current.frameDuration) {
                    this.frameTimer = 0;
                    this.frameIndex = (this.frameIndex + 1) % current.frames.length;
                }
            }

            getFrame() {
                const current = this.definitions[this.state];
                if (!current) return null;
                return current.frames[this.frameIndex] || current.frames[0] || null;
            }
        }

                "ABCDDDAA",
                "ABCCDAAA",
                "ABBDAAAA",
                "AAAEAAAA",
                "AAAAAAAA"
            ],
            [
                "AAAAAAAA",
                "ABBBBBBA",
                "ABCCCDDA",
                "ABBCDDAA",
                "AACDDAAA",
                "AAADAAAA",
                "AAAEAAAA",
                "AAAAAAAA"
            ],
            [
                "AAAAAAAA",
                "ABBBBBBA",
                "ABCCCDDA",
                "ABCDDDAA",
                "AACDDAAA",
                "AAADAAAA",
                "AAAEAAAA",
                "AAAAAAAA"
            ]
        ];

        const keys = { left: false, right: false, down: false, jump: false, run: false };
        let audioCtx = null;

        let state;

        function resetState() {
            state = {
                running: false,
                won: false,
                dead: false,
                score: 0,
                coins: 0,
                time: 400,
                timeAccumulator: 0,
                cameraX: 0,
                frame: 0,
                fireballs: [],
                particles: [],
                items: [],
                blocks: [],
                solids: [],
                enemies: [],
                scenery: buildScenery(),
                flag: { x: 3112, y: 4 * TILE, width: 10, height: 9 * TILE, triggered: false },
                castle: { x: 3200, y: 7 * TILE, width: 168, height: 6 * TILE },
                pits: [
                    { x: 2440, width: 96 },
                    { x: 2760, width: 96 }
                ],
                player: {
                    x: 80,
                    y: GROUND_Y - 28,
                    width: 14,
                    height: 28,
                    baseWidth: 14,
                    smallHeight: 28,
                    bigHeight: 56,
                    crouchHeight: 40,
                    vx: 0,
                    vy: 0,
                    face: 1,
                    grounded: false,
                    crouching: false,
                    jumpHold: 0,
                    jumpConsumed: false,
                    runAnim: 0,
                    size: "small",
                    canShoot: false,
                    invuln: 0,
                    starTimer: 0,
                    growthTimer: 0,
                    lives: 3,
                    shotCooldown: 0,
                    sliding: false,
                    lockControl: false,
                    animation: new AnimationController(PLAYER_ANIMATIONS, "idle")
                }
            };

            buildLevel();
        }

        function buildScenery() {
            return {
                clouds: [
                    { x: 160, y: 70, s: 1 },
                    { x: 530, y: 110, s: 1.3 },
                    { x: 890, y: 80, s: 1 },
                    { x: 1290, y: 60, s: 1.2 },
                    { x: 1700, y: 95, s: 1.1 },
                    { x: 2120, y: 75, s: 1.35 },
                    { x: 2540, y: 100, s: 1 },
                    { x: 2970, y: 68, s: 1.25 }
                ],
                bushes: [
                    { x: 180, y: GROUND_Y - 22, w: 3 },
                    { x: 640, y: GROUND_Y - 22, w: 4 },
                    { x: 1180, y: GROUND_Y - 22, w: 3 },
                    { x: 1950, y: GROUND_Y - 22, w: 4 },
                    { x: 2860, y: GROUND_Y - 22, w: 3 }
                ],
                hills: [
                    { x: 340, y: GROUND_Y, w: 180, h: 100 },
                    { x: 1480, y: GROUND_Y, w: 220, h: 120 },
                    { x: 2350, y: GROUND_Y, w: 170, h: 88 }
                ]
            };
        }

        function buildLevel() {
            const blocks = state.blocks;
            const solids = state.solids;
            const enemies = state.enemies;

            function addGroundSegment(x, width) {
                solids.push({ x, y: GROUND_Y, width, height: WORLD_HEIGHT - GROUND_Y, type: "ground" });
            }

            addGroundSegment(0, 2440);
            addGroundSegment(2536, 224);
            addGroundSegment(2856, WORLD_WIDTH - 2856);

            [
                { x: 512, h: 64 },
                { x: 704, h: 96 },
                { x: 928, h: 128 },
                { x: 1152, h: 128 }
            ].forEach(pipe => {
                solids.push({
                    x: pipe.x,
                    y: GROUND_Y - pipe.h,
                    width: 64,
                    height: pipe.h,
                    type: "pipe",
                    pipeTop: true
                });
            });

            [
                { x: 320, y: 9 },
                { x: 352, y: 9, question: "coin" },
                { x: 384, y: 9 },
                { x: 448, y: 9, question: "mushroom" },
                { x: 608, y: 9, question: "coin" },
                { x: 640, y: 9 },
                { x: 672, y: 9, question: "star" },
                { x: 768, y: 9 },
                { x: 800, y: 9, question: "flower" },
                { x: 832, y: 9 },
                { x: 1184, y: 9, question: "coin" },
                { x: 1216, y: 9 },
                { x: 1248, y: 9, question: "mushroom" },
                { x: 1568, y: 9 },
                { x: 1600, y: 9, question: "coin" },
                { x: 1632, y: 9 },
                { x: 1952, y: 9 },
                { x: 1984, y: 9, question: "coin" },
                { x: 2016, y: 9 },
                { x: 2048, y: 9, question: "coin" },
                { x: 2608, y: 8, question: "coin" },
                { x: 2640, y: 8, question: "coin" },
                { x: 2672, y: 8, question: "coin" }
            ].forEach(spec => {
                const kind = spec.question ? "question" : "brick";
                addBlock(spec.x, spec.y * TILE, kind, spec.question || null, true);
            });

            [
                { x: 1088, y: 9, breakable: false },
                { x: 1120, y: 9, breakable: false },
                { x: 1472, y: 8, breakable: true },
                { x: 1504, y: 8, breakable: true },
                { x: 1536, y: 8, breakable: false },
                { x: 2176, y: 7, breakable: true },
                { x: 2208, y: 7, breakable: true },
                { x: 2240, y: 7, breakable: true },
                { x: 2272, y: 7, breakable: false }
            ].forEach(spec => addBlock(spec.x, spec.y * TILE, "brick", null, spec.breakable));

            buildStaircase(2860, 7, 1);
            buildStaircase(3030, 6, -1);

            [
                { x: 420, type: "goomba" },
                { x: 836, type: "goomba" },
                { x: 1350, type: "goomba" },
                { x: 1420, type: "goomba" },
                { x: 1730, type: "koopa" },
                { x: 2100, type: "goomba" },
                { x: 2300, type: "koopa" },
                { x: 2720, type: "goomba" }
            ].forEach(spawnEnemy);

            function addBlock(x, y, type, itemType, breakable) {
                const block = {
                    x,
                    y,
                    width: TILE,
                    height: TILE,
                    type,
                    itemType,
                    used: false,
                    breakable,
                    bounce: 0,
                    hitCooldown: 0
                };
                blocks.push(block);
                solids.push(block);
            }

            function buildStaircase(startX, rows, dir) {
                for (let i = 0; i < rows; i++) {
                    const steps = dir > 0 ? i + 1 : rows - i;
                    for (let y = 0; y < steps; y++) {
                        solids.push({
                            x: startX + i * TILE,
                            y: GROUND_Y - TILE - y * TILE,
                            width: TILE,
                            height: TILE,
                            type: "stone"
                        });
                    }
                }
            }

            function spawnEnemy(spec) {
                const isKoopa = spec.type === "koopa";
                enemies.push({
                    type: spec.type,
                    x: spec.x,
                    y: GROUND_Y - (isKoopa ? 48 : 30),
                    width: isKoopa ? 18 : 18,
                    height: isKoopa ? 48 : 30,
                    vx: -0.75,
                    vy: 0,
                    grounded: false,
                    alive: true,
                    stomped: false,
                    shell: false,
                    shellTimer: 0,
                    face: -1,
                    animation: new AnimationController(isKoopa ? KOOPA_ANIMATIONS : GOOMBA_ANIMATIONS, "walk")
                });
            }
        }

        function rectsOverlap(a, b) {
            return a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y;
        }

        function getSolidCandidates(entity) {
            return state.solids.filter(s =>
                entity.x + entity.width > s.x - 4 &&
                entity.x < s.x + s.width + 4 &&
                entity.y + entity.height > s.y - 80 &&
                entity.y < s.y + s.height + 80
            );
        }

        function playTone(freq, duration, type = "square", volume = 0.03) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, now);
            gain.gain.setValueAtTime(volume, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + duration);
        }

        function addScore(value) {
            state.score += value;
        }

        function spawnItem(block) {
            const type = block.itemType;
            if (!type) return;

            if (type === "coin") {
                state.coins += 1;
                addScore(200);
                state.particles.push({
                    type: "coin",
                    x: block.x + 8,
                    y: block.y - 4,
                    vx: 0,
                    vy: -4,
                    life: 34
                });
                playTone(880, 0.1);
                return;
            }

            const player = state.player;
            const actualType = type === "flower" && player.size === "small" ? "mushroom" : type;
            state.items.push({
                type: actualType,
                x: block.x + 4,
                y: block.y,
                width: 24,
                height: 24,
                vx: 0.9,
                vy: 0,
                emerge: 32,
                startY: block.y,
                grounded: false,
                active: false,
                dir: 1
            });
            playTone(660, 0.16);
        }

        function bumpBlock(block) {
            if (block.hitCooldown > 0) return;
            block.hitCooldown = 10;
            block.bounce = 8;

            state.enemies.forEach(enemy => {
                const onTop = enemy.x + enemy.width > block.x && enemy.x < block.x + block.width &&
                    Math.abs(enemy.y + enemy.height - block.y) < 8;
                if (onTop && enemy.alive) {
                    enemy.alive = false;
                    enemy.vy = -5;
                    addScore(100);
                }
            });

            if (block.type === "question" && !block.used) {
                block.used = true;
                spawnItem(block);
                return;
            }

            if (block.type === "brick") {
                const player = state.player;
                if (block.breakable && player.size !== "small") {
                    state.blocks = state.blocks.filter(b => b !== block);
                    state.solids = state.solids.filter(s => s !== block);
                    for (let i = 0; i < 4; i++) {
                        state.particles.push({
                            type: "debris",
                            x: block.x + 12,
                            y: block.y + 12,
                            vx: (i % 2 === 0 ? -1 : 1) * (1.8 + i * 0.3),
                            vy: -4 - (i > 1 ? 0.8 : 0),
                            life: 36
                        });
                    }
                    playTone(180, 0.14, "square", 0.05);
                } else {
                    playTone(300, 0.08, "square", 0.03);
                }
            }
        }

        function setPlayerSize(mode) {
            const p = state.player;
            const oldBottom = p.y + p.height;
            p.size = mode;
            p.height = mode === "small" ? p.smallHeight : p.bigHeight;
            p.width = mode === "small" ? 14 : 16;
            p.y = oldBottom - p.height;
            p.crouching = false;
        }

        function canPlayerStand() {
            const p = state.player;
            if (p.size === "small") return true;
            const testRect = {
                x: p.x,
                y: p.y + p.height - p.bigHeight,
                width: p.width,
                height: p.bigHeight
            };
            return !getSolidCandidates(testRect).some(solid => rectsOverlap(testRect, solid));
        }

        function killPlayer() {
            const p = state.player;
            if (state.dead || state.won || p.invuln > 0) return;

            if (p.size !== "small") {
                setPlayerSize("small");
                p.canShoot = false;
                p.invuln = 120;
                playTone(220, 0.2, "sawtooth", 0.04);
                return;
            }

            state.dead = true;
            p.lockControl = true;
            p.vx = 0;
            p.vy = -10;
            playTone(120, 0.4, "triangle", 0.05);
            setTimeout(() => {
                showOverlay("GAME OVER", "按开始重新进入 1-1");
            }, 1200);
        }

        function showOverlay(title, text) {
            overlay.classList.remove("hidden");
            panel.innerHTML = `
                <h1>${title}</h1>
                <p>${text}</p>
                <p>得分 ${String(state.score).padStart(6, "0")} · 金币 ${String(state.coins).padStart(2, "0")}</p>
                <button id="restart-btn">重新开始</button>
            `;
            document.getElementById("restart-btn").addEventListener("click", startGame);
        }

        function collectItem(item) {
            const p = state.player;
            if (item.type === "mushroom") {
                if (p.size === "small") {
                    setPlayerSize("big");
                    p.growthTimer = 30;
                    addScore(1000);
                    playTone(520, 0.2);
                    return;
                }
                addScore(1000);
                playTone(520, 0.2);
            } else if (item.type === "flower") {
                if (p.size === "small") setPlayerSize("big");
                p.canShoot = true;
                addScore(1000);
                playTone(740, 0.18);
            } else if (item.type === "star") {
                p.starTimer = 360;
                p.invuln = Math.max(p.invuln, 360);
                addScore(1000);
                playTone(990, 0.12, "triangle", 0.04);
            }
        }

        function stompEnemy(enemy) {
            const p = state.player;
            p.vy = -7.2;
            p.grounded = false;
            p.jumpHold = 0;
            if (enemy.type === "koopa") {
                if (!enemy.shell) {
                    enemy.shell = true;
                    enemy.vx = 0;
                    enemy.height = 28;
                    enemy.y += 20;
                    addScore(200);
                } else if (Math.abs(enemy.vx) < 0.01) {
                    enemy.vx = 4.6 * (p.face || 1);
                    addScore(400);
                } else {
                    enemy.vx = 0;
                }
            } else {
                enemy.alive = false;
                enemy.stomped = true;
                enemy.vy = -2;
                addScore(100);
            }
            playTone(280, 0.08);
        }

        function shootFireball() {
            const p = state.player;
            if (!p.canShoot || p.shotCooldown > 0 || state.fireballs.length >= 2) return;
            state.fireballs.push({
                x: p.x + (p.face > 0 ? p.width : -10),
                y: p.y + p.height * 0.55,
                width: 12,
                height: 12,
                vx: p.face * 5.6,
                vy: -1.2,
                life: 180,
                grounded: false
            });
            p.shotCooldown = 20;
            playTone(420, 0.08, "square", 0.04);
        }

        function hitFlag() {
            if (state.flag.triggered) return;
            const p = state.player;
            state.flag.triggered = true;
            state.won = true;
            p.lockControl = true;
            p.vx = 0;
            p.vy = 0;
            addScore(5000);
            playTone(523, 0.15);
            setTimeout(() => playTone(659, 0.15), 160);
            setTimeout(() => playTone(784, 0.22), 320);
            setTimeout(() => showOverlay("COURSE CLEAR", "你完成了 1-1 单页版复刻"), 1800);
        }

        function update(dt) {
            if (!state.running) return;
            state.frame += 1;
            updateTimer(dt);
            updatePlayer();
            updateItems();
            updateEnemies();
            updateFireballs();
            updateParticles();
            updateCamera();
            updateBlocks();
            updateAnimations();
        }

        function updateTimer(dt) {
            if (state.dead || state.won) return;
            state.timeAccumulator += dt;
            if (state.timeAccumulator > 1000) {
                state.timeAccumulator -= 1000;
                state.time = Math.max(0, state.time - 1);
                if (state.time === 0) killPlayer();
            }
        }

        function resolveAgainstSolids(entity, options = {}) {
            const candidates = getSolidCandidates(entity);
            entity.grounded = false;

            entity.x += entity.vx;
            candidates.forEach(solid => {
                if (!rectsOverlap(entity, solid)) return;
                if (entity.vx > 0) {
                    entity.x = solid.x - entity.width;
                    entity.vx = 0;
                } else if (entity.vx < 0) {
                    entity.x = solid.x + solid.width;
                    entity.vx = 0;
                }
            });

            entity.y += entity.vy;
            candidates.forEach(solid => {
                if (!rectsOverlap(entity, solid)) return;
                if (entity.vy > 0) {
                    entity.y = solid.y - entity.height;
                    entity.vy = 0;
                    entity.grounded = true;
                } else if (entity.vy < 0) {
                    entity.y = solid.y + solid.height;
                    entity.vy = 0;
                    if (options.bumpBlocks && state.blocks.includes(solid)) bumpBlock(solid);
                }
            });
        }

        function updatePlayer() {
            const p = state.player;
            if (p.shotCooldown > 0) p.shotCooldown--;
            if (p.invuln > 0) p.invuln--;
            if (p.starTimer > 0) p.starTimer--;
            if (p.growthTimer > 0) p.growthTimer--;

            if (!p.lockControl) {
                const accel = keys.run ? 0.28 : 0.18;
                const max = keys.run ? 4.7 : 3;
                const friction = p.grounded ? 0.84 : 0.94;
                const move = (keys.left ? -1 : 0) + (keys.right ? 1 : 0);
                if (move !== 0) {
                    p.vx += move * accel;
                    p.face = move;
                    p.runAnim += Math.abs(p.vx) * 0.18;
                } else {
                    p.vx *= friction;
                    if (Math.abs(p.vx) < 0.05) p.vx = 0;
                }
                p.vx = Math.max(-max, Math.min(max, p.vx));

                const wantsCrouch = keys.down && p.size !== "small" && p.grounded;
                if (wantsCrouch && !p.crouching) {
                    const oldBottom = p.y + p.height;
                    p.crouching = true;
                    p.height = p.crouchHeight;
                    p.y = oldBottom - p.height;
                } else if (!wantsCrouch && p.crouching && canPlayerStand()) {
                    const oldBottom = p.y + p.height;
                    p.crouching = false;
                    p.height = p.bigHeight;
                    p.y = oldBottom - p.height;
                }

                if (keys.jump && p.grounded && !p.jumpConsumed) {
                    p.vy = -8.7;
                    p.grounded = false;
                    p.jumpHold = 8;
                    p.jumpConsumed = true;
                    playTone(460, 0.08, "square", 0.035);
                }

                if (!keys.jump) {
                    p.jumpConsumed = false;
                    p.jumpHold = 0;
                } else if (p.jumpHold > 0 && p.vy < 0) {
                    p.vy -= 0.34;
                    p.jumpHold--;
                }
            }

            p.vy += p.vy < 0 ? 0.34 : 0.5;
            p.vy = Math.min(p.vy, 11);
            resolveAgainstSolids(p, { bumpBlocks: true });

            const inPit = state.pits.some(pit => p.x + p.width * 0.5 > pit.x && p.x + p.width * 0.5 < pit.x + pit.width);
            if (inPit && p.y + p.height >= GROUND_Y - 1 && p.vy >= 0) {
                p.grounded = false;
            }

            if (p.y > WORLD_HEIGHT + 120) killPlayer();

            state.items = state.items.filter(item => {
                if (rectsOverlap(p, item) && item.active) {
                    collectItem(item);
                    return false;
                }
                return true;
            });

            state.enemies.forEach(enemy => {
                if (!enemy.alive) return;
                if (!rectsOverlap(p, enemy)) return;
                if (p.starTimer > 0) {
                    enemy.alive = false;
                    enemy.vy = -6;
                    addScore(200);
                    return;
                }
                const stomp = p.vy > 0 && p.y + p.height - enemy.y < 18;
                if (stomp) stompEnemy(enemy);
                else if (!(enemy.shell && Math.abs(enemy.vx) > 0.01 && p.invuln > 0)) killPlayer();
            });

            if (rectsOverlap(p, state.flag) || p.x + p.width > state.flag.x) hitFlag();
        }

        function updateItems() {
            state.items.forEach(item => {
                if (item.emerge > 0) {
                    item.y -= 1;
                    item.emerge--;
                    if (item.emerge === 0) item.active = true;
                    return;
                }

                if (item.type === "flower") return;

                item.vy += 0.35;
                item.vy = Math.min(item.vy, 8);
                item.grounded = false;

                item.x += item.vx;
                getSolidCandidates(item).forEach(solid => {
                    if (!rectsOverlap(item, solid)) return;
                    if (item.vx > 0) item.x = solid.x - item.width;
                    else if (item.vx < 0) item.x = solid.x + solid.width;
                    item.dir *= -1;
                    item.vx = Math.abs(item.vx) * item.dir;
                });

                item.y += item.vy;
                getSolidCandidates(item).forEach(solid => {
                    if (!rectsOverlap(item, solid)) return;
                    if (item.vy > 0) {
                        item.y = solid.y - item.height;
                        item.vy = 0;
                        item.grounded = true;
                    } else if (item.vy < 0) {
                        item.y = solid.y + solid.height;
                        item.vy = 0;
                    }
                });
            });
        }

        function updateEnemies() {
            state.enemies = state.enemies.filter(enemy => enemy.y < WORLD_HEIGHT + 120);
            state.enemies.forEach(enemy => {
                if (!enemy.alive) {
                    enemy.vy += 0.45;
                    enemy.y += enemy.vy;
                    return;
                }

                enemy.vy += 0.45;
                enemy.vy = Math.min(enemy.vy, 10);
                enemy.grounded = false;

                enemy.y += enemy.vy;
                getSolidCandidates(enemy).forEach(solid => {
                    if (!rectsOverlap(enemy, solid)) return;
                    if (enemy.vy > 0) {
                        enemy.y = solid.y - enemy.height;
                        enemy.vy = 0;
                        enemy.grounded = true;
                    } else if (enemy.vy < 0) {
                        enemy.y = solid.y + solid.height;
                        enemy.vy = 0;
                    }
                });

                if (enemy.shell && Math.abs(enemy.vx) < 0.01) {
                    enemy.shellTimer++;
                }

                const aheadX = enemy.x + (enemy.vx >= 0 ? enemy.width + 2 : -2);
                const groundAhead = state.solids.some(s =>
                    aheadX > s.x && aheadX < s.x + s.width &&
                    enemy.y + enemy.height + 6 >= s.y && enemy.y + enemy.height + 6 <= s.y + 10
                );
                if (!groundAhead && !enemy.shell) enemy.vx *= -1;

                enemy.x += enemy.vx;
                getSolidCandidates(enemy).forEach(solid => {
                    if (!rectsOverlap(enemy, solid)) return;
                    if (enemy.vx > 0) enemy.x = solid.x - enemy.width;
                    else if (enemy.vx < 0) enemy.x = solid.x + solid.width;
                    enemy.vx *= -1;
                });
                enemy.face = enemy.vx >= 0 ? 1 : -1;

                if (enemy.shell && Math.abs(enemy.vx) > 0.01) {
                    state.enemies.forEach(other => {
                        if (other === enemy || !other.alive) return;
                        if (rectsOverlap(enemy, other)) {
                            other.alive = false;
                            other.vy = -5;
                            addScore(500);
                        }
                    });
                }
            });
        }

        function updateFireballs() {
            state.fireballs = state.fireballs.filter(ball => ball.life > 0);
            state.fireballs.forEach(ball => {
                ball.life--;
                ball.vy += 0.35;
                ball.x += ball.vx;
                getSolidCandidates(ball).forEach(solid => {
                    if (!rectsOverlap(ball, solid)) return;
                    if (ball.vx > 0) ball.x = solid.x - ball.width;
                    else if (ball.vx < 0) ball.x = solid.x + solid.width;
                    ball.vx *= -1;
                });

                ball.y += ball.vy;
                getSolidCandidates(ball).forEach(solid => {
                    if (!rectsOverlap(ball, solid)) return;
                    if (ball.vy > 0) {
                        ball.y = solid.y - ball.height;
                        ball.vy = -4.4;
                    } else if (ball.vy < 0) {
                        ball.y = solid.y + solid.height;
                        ball.vy = 1.2;
                    }
                });

                state.enemies.forEach(enemy => {
                    if (!enemy.alive || !rectsOverlap(ball, enemy)) return;
                    enemy.alive = false;
                    enemy.vy = -5;
                    ball.life = 0;
                    addScore(200);
                    playTone(190, 0.08, "square", 0.03);
                });
            });
        }

        function updateParticles() {
            state.particles = state.particles.filter(p => p.life > 0);
            state.particles.forEach(p => {
                p.life--;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.type === "coin" ? 0.28 : 0.32;
            });
        }

        function updateCamera() {
            const target = state.player.x - canvas.width * 0.4;
            state.cameraX += (target - state.cameraX) * 0.12;
            state.cameraX = Math.max(0, Math.min(WORLD_WIDTH - canvas.width, state.cameraX));
        }

        function updateBlocks() {
            state.blocks.forEach(block => {
                if (block.bounce > 0) block.bounce--;
                if (block.hitCooldown > 0) block.hitCooldown--;
            });
        }

        // 这里只从已有物理字段推导动画状态，不反向修改运动逻辑。
        // 这保证了重构只发生在渲染层，原有玩法和判定都能保持兼容。
        function updateAnimations() {
            const p = state.player;
            const speed = Math.abs(p.vx);
            let playerState = "idle";

            if (state.dead) playerState = "dead";
            else if (p.growthTimer > 0) playerState = "grow";
            else if (p.crouching) playerState = "crouch";
            else if (!p.grounded) playerState = p.vy < 0 ? "jump" : "fall";
            else if (speed > 3.2) playerState = "run";
            else if (speed > 0.25) playerState = "walk";

            p.animation.setState(playerState);
            p.animation.update(1);

            state.enemies.forEach(enemy => {
                if (!enemy.animation) return;

                let enemyState = "walk";
                if (enemy.type === "goomba") {
                    enemyState = !enemy.alive && enemy.stomped ? "flat" : "walk";
                } else if (enemy.shell) {
                    enemyState = Math.abs(enemy.vx) > 0.01 ? "shellMove" : "shellIdle";
                }

                enemy.animation.setState(enemyState);
                enemy.animation.update(1);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
            drawPits();
            drawSolids();
            drawItems();
            drawEnemies();
            drawFireballs();
            drawParticles();
            drawFlagAndCastle();
            drawPlayer();
            drawHud();
        }

        function worldToScreenX(x, factor = 1) {
            return x - state.cameraX * factor;
        }

        function drawBackground() {
            ctx.fillStyle = NES.sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            state.scenery.hills.forEach(h => {
                const x = worldToScreenX(h.x, 0.55);
                ctx.fillStyle = "#7cb342";
                ctx.beginPath();
                ctx.arc(x + h.w * 0.4, h.y, h.h * 0.75, Math.PI, Math.PI * 2);
                ctx.arc(x + h.w * 0.7, h.y, h.h, Math.PI, Math.PI * 2);
                ctx.fill();
            });

            state.scenery.clouds.forEach(cloud => {
                const x = worldToScreenX(cloud.x, 0.25);
                const y = cloud.y;
                const r = 18 * cloud.s;
                ctx.fillStyle = NES.cloud;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.arc(x + r * 0.9, y - r * 0.2, r * 0.9, 0, Math.PI * 2);
                ctx.arc(x + r * 1.8, y, r, 0, Math.PI * 2);
                ctx.fill();
            });

            state.scenery.bushes.forEach(b => {
                const x = worldToScreenX(b.x, 0.7);
                const y = b.y;
                for (let i = 0; i < b.w; i++) {
                    ctx.fillStyle = i % 2 === 0 ? NES.bushDark : NES.bush;
                    ctx.beginPath();
                    ctx.arc(x + i * 26, y, 24, Math.PI, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function drawPits() {
            state.pits.forEach(pit => {
                const x = worldToScreenX(pit.x);
                ctx.fillStyle = NES.black;
                ctx.fillRect(x, GROUND_Y, pit.width, canvas.height - GROUND_Y);
            });
        }

        function drawSolids() {
            state.solids.forEach(solid => {
                const x = worldToScreenX(solid.x);
                const y = solid.y - (solid.bounce || 0);

                if (solid.type === "ground") {
                    ctx.fillStyle = NES.groundBody;
                    ctx.fillRect(x, solid.y, solid.width, solid.height);
                    ctx.fillStyle = NES.groundTop;
                    ctx.fillRect(x, solid.y, solid.width, 12);
                    for (let px = 0; px < solid.width; px += 32) {
                        ctx.fillStyle = NES.blockDark;
                        ctx.fillRect(x + px + 8, solid.y + 16, 8, 8);
                    }
                } else if (solid.type === "pipe") {
                    drawPipe(x, y, solid.width, solid.height);
                } else if (solid.type === "stone") {
                    drawBrickBlock(x, y, "#787878", "#404040");
                } else if (solid.type === "brick") {
                    drawBrickBlock(x, y, solid.breakable ? NES.block : "#8f6a3d", NES.blockDark);
                } else if (solid.type === "question") {
                    drawQuestionBlock(x, y, solid.used);
                }
            });
        }

        function drawBrickBlock(x, y, fill, dark) {
            drawPixelPattern(x, y, TILE, TILE, BRICK_PATTERN, {
                A: fill,
                B: dark,
                C: lighten(fill, 24)
            });
        }

        function drawQuestionBlock(x, y, used) {
            const frame = QUESTION_FRAMES[Math.floor(state.frame / 10) % QUESTION_FRAMES.length];
            if (used) {
                drawPixelPattern(x, y, TILE, TILE, USED_BLOCK_PATTERN, {
                    A: "#b8a078",
                    B: "#786850",
                    C: "#9b8865"
                });
                return;
            }

            drawPixelPattern(x, y, TILE, TILE, frame, {
                A: NES.question,
                B: lighten(NES.question, 20),
                C: NES.ui,
                D: NES.questionDark,
                E: "#8c4c00"
            });
        }

        function drawPipe(x, y, width, height) {
            const lipHeight = 12;
            ctx.fillStyle = NES.pipe;
            ctx.fillRect(x, y, width, height);

            ctx.fillStyle = lighten(NES.pipe, 38);
            ctx.fillRect(x + 3, y + 2, 8, height - 2);
            ctx.fillRect(x + 14, y + 2, 6, height - 2);

            ctx.fillStyle = NES.pipeDark;
            ctx.fillRect(x + width - 12, y + 2, 8, height - 2);
            ctx.fillRect(x + width - 22, y + 6, 5, height - 6);

            ctx.fillStyle = lighten(NES.pipe, 18);
            ctx.fillRect(x - 4, y, width + 8, lipHeight);
            ctx.fillRect(x - 2, y + 2, 8, lipHeight - 4);

            ctx.fillStyle = NES.pipeDark;
            ctx.fillRect(x + width - 8, y + 2, 6, lipHeight - 2);
            ctx.fillRect(x - 4, y + lipHeight - 2, width + 8, 2);

            for (let stripeY = y + lipHeight + 8; stripeY < y + height; stripeY += 20) {
                ctx.fillStyle = "rgba(255,255,255,0.12)";
                ctx.fillRect(x + 12, stripeY, 10, 2);
                ctx.fillStyle = "rgba(0,0,0,0.18)";
                ctx.fillRect(x + width - 18, stripeY + 6, 10, 2);
            }
        }

        function drawPixelPattern(x, y, width, height, rows, palette) {
            const cols = rows[0].length;
            const cellW = width / cols;
            const cellH = height / rows.length;

            rows.forEach((row, rowIndex) => {
                row.split("").forEach((char, colIndex) => {
                    const color = palette[char];
                    if (!color) return;
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        x + colIndex * cellW,
                        y + rowIndex * cellH,
                        Math.ceil(cellW),
                        Math.ceil(cellH)
                    );
                });
            });
        }

        function lighten(hex, amount) {
            const value = hex.replace("#", "");
            const channels = value.match(/.{1,2}/g).map(part => parseInt(part, 16));
            const next = channels.map(channel => Math.max(0, Math.min(255, channel + amount)));
            return `#${next.map(channel => channel.toString(16).padStart(2, "0")).join("")}`;
        }

        function drawItems() {
            state.items.forEach(item => {
                const x = worldToScreenX(item.x);
                const y = item.y;
                if (item.type === "mushroom") {
                    ctx.fillStyle = "#f83800";
                    ctx.fillRect(x + 2, y + 4, 20, 10);
                    ctx.fillStyle = NES.ui;
                    ctx.fillRect(x + 5, y + 14, 14, 8);
                    ctx.fillStyle = "#fce0a8";
                    ctx.fillRect(x + 8, y + 10, 4, 4);
                    ctx.fillRect(x + 16, y + 8, 4, 4);
                } else if (item.type === "flower") {
                    ctx.fillStyle = "#f83800";
                    ctx.fillRect(x + 8, y, 8, 8);
                    ctx.fillStyle = "#f8f878";
                    ctx.fillRect(x + 4, y + 4, 16, 8);
                    ctx.fillStyle = "#00a800";
                    ctx.fillRect(x + 10, y + 12, 4, 12);
                } else if (item.type === "star") {
                    ctx.fillStyle = NES.star;
                    ctx.beginPath();
                    ctx.moveTo(x + 12, y);
                    ctx.lineTo(x + 16, y + 8);
                    ctx.lineTo(x + 24, y + 8);
                    ctx.lineTo(x + 18, y + 14);
                    ctx.lineTo(x + 20, y + 24);
                    ctx.lineTo(x + 12, y + 18);
                    ctx.lineTo(x + 4, y + 24);
                    ctx.lineTo(x + 6, y + 14);
                    ctx.lineTo(x, y + 8);
                    ctx.lineTo(x + 8, y + 8);
                    ctx.fill();
                }
            });
        }

        function drawEnemies() {
            state.enemies.forEach(enemy => {
                const x = worldToScreenX(enemy.x);
                const y = enemy.y;
                const spriteFamily = enemy.type === "goomba" ? "goomba" : "koopa";
                const frame = enemy.animation ? enemy.animation.getFrame() : "walkA";
                const palette = enemy.type === "goomba"
                    ? {
                        body: NES.goomba,
                        dark: "#5c3418",
                        light: NES.ui,
                        legs: NES.black,
                        ink: NES.black
                    }
                    : {
                        shell: NES.greenShell,
                        shellDark: "#0e6a2a",
                        shellLight: "#7ce08f",
                        body: NES.turtleBody,
                        legs: NES.black,
                        ink: NES.black
                    };

                spriteRenderer.drawSprite(
                    `enemy.${spriteFamily}.${frame}`,
                    x,
                    y,
                    enemy.width,
                    enemy.height,
                    {
                        flipX: enemy.face > 0,
                        palette
                    }
                );
            });
        }

        function drawFireballs() {
            state.fireballs.forEach(ball => {
                const x = worldToScreenX(ball.x);
                ctx.fillStyle = NES.fire;
                ctx.fillRect(x, ball.y, 12, 12);
                ctx.fillStyle = NES.question;
                ctx.fillRect(x + 4, ball.y + 4, 4, 4);
            });
        }

        function drawParticles() {
            state.particles.forEach(p => {
                const x = worldToScreenX(p.x);
                ctx.fillStyle = p.type === "coin" ? NES.question : NES.block;
                ctx.fillRect(x, p.y, p.type === "coin" ? 12 : 8, p.type === "coin" ? 16 : 8);
            });
        }

        function drawFlagAndCastle() {
            const flagX = worldToScreenX(state.flag.x);
            ctx.fillStyle = "#f8f8f8";
            ctx.fillRect(flagX, state.flag.y, state.flag.width, state.flag.height);
            ctx.fillStyle = NES.flag;
            ctx.fillRect(flagX + 10, state.flag.y + 14, 34, 22);

            const castleX = worldToScreenX(state.castle.x);
            const castle = state.castle;
            ctx.fillStyle = NES.castle;
            ctx.fillRect(castleX, castle.y, castle.width, castle.height);
            ctx.fillStyle = "#707070";
            for (let i = 0; i < castle.width; i += 24) {
                ctx.fillRect(castleX + i, castle.y - 12, 16, 12);
            }
            ctx.fillStyle = NES.black;
            ctx.fillRect(castleX + 62, castle.y + castle.height - 44, 42, 44);
            ctx.fillRect(castleX + 20, castle.y + 40, 18, 18);
            ctx.fillRect(castleX + 126, castle.y + 40, 18, 18);
        }

        function drawPlayer() {
            const p = state.player;
            if (p.invuln > 0 && Math.floor(p.invuln / 5) % 2 === 0) return;

            const x = worldToScreenX(p.x);
            const y = p.y;
            const variant = p.canShoot ? "fire" : (p.size === "small" ? "small" : "big");
            const frame = p.animation ? p.animation.getFrame() : "idle";

            spriteRenderer.drawSprite(
                `player.${variant}.${frame}`,
                x,
                y,
                p.width + 4,
                p.height,
                {
                    flipX: p.face < 0,
                    palette: {
                        primary: p.canShoot ? "#ffffff" : NES.marioRed,
                        secondary: p.canShoot ? "#f87800" : NES.marioBrown,
                        skin: NES.skin,
                        highlight: "#f8f878",
                        ink: NES.black
                    }
                }
            );
        }

        function drawHud() {
            hudLeft.innerHTML = `MARIO<br>${String(state.score).padStart(6, "0")} C${String(state.coins).padStart(2, "0")}`;
            hudMid.innerHTML = `WORLD<br>1-1 ${state.player.size === "small" ? "SMALL" : state.player.canShoot ? "FIRE" : "BIG"}`;
            hudRight.innerHTML = `TIME<br>${String(state.time).padStart(3, "0")}`;
        }

        function loop(ts) {
            if (!loop.last) loop.last = ts;
            const dt = Math.min(33, ts - loop.last);
            loop.last = ts;
            update(dt);
            draw();
            requestAnimationFrame(loop);
        }

        function startGame() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            resetState();
            overlay.classList.add("hidden");
            state.running = true;
        }

        startBtn.addEventListener("click", startGame);

        document.addEventListener("keydown", e => {
            if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " ", "Shift", "x", "X"].includes(e.key) || ["ShiftLeft", "ShiftRight", "KeyZ", "KeyX"].includes(e.code)) {
                e.preventDefault();
            }
            if (e.key === "ArrowLeft") keys.left = true;
            if (e.key === "ArrowRight") keys.right = true;
            if (e.key === "ArrowDown") keys.down = true;
            if (e.key === "ArrowUp" || e.key === " " || e.key.toLowerCase() === "z") keys.jump = true;
            if (e.key === "Shift" || e.code === "ShiftLeft" || e.code === "ShiftRight") keys.run = true;
            if ((e.key.toLowerCase() === "x" || e.code === "KeyX") && !e.repeat) shootFireball();
        });

        document.addEventListener("keyup", e => {
            if (e.key === "ArrowLeft") keys.left = false;
            if (e.key === "ArrowRight") keys.right = false;
            if (e.key === "ArrowDown") keys.down = false;
            if (e.key === "ArrowUp" || e.key === " " || e.key.toLowerCase() === "z") keys.jump = false;
            if (e.key === "Shift" || e.code === "ShiftLeft" || e.code === "ShiftRight") keys.run = false;
        });

        resetState();
        draw();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
